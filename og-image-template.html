<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1200"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0D0D0D;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      position: relative;
    }

    /* Red spotlight glow — top right */
    .glow-tr {
      position: absolute;
      top: -160px;
      right: -160px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,56,92,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Subtle bottom-left glow */
    .glow-bl {
      position: absolute;
      bottom: -200px;
      left: -100px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,56,92,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Decorative concentric rings — bottom right (stage spotlight) */
    .rings {
      position: absolute;
      bottom: -80px;
      right: -80px;
      width: 420px;
      height: 420px;
      pointer-events: none;
    }
    .rings circle {
      fill: none;
      stroke: rgba(255,56,92,0.08);
      stroke-width: 1;
    }

    /* Main content */
    .content {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 90px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .eyebrow-bar {
      width: 40px;
      height: 4px;
      background: #FF385C;
      border-radius: 2px;
    }
    .eyebrow-text {
      font-size: 15px;
      font-weight: 600;
      color: #FF385C;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .logo {
      font-size: 88px;
      font-weight: 900;
      color: #FFFFFF;
      letter-spacing: -3px;
      line-height: 1;
      margin-bottom: 28px;
    }
    .logo span {
      color: #FF385C;
    }

    .tagline {
      font-size: 28px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      line-height: 1.4;
      max-width: 680px;
      margin-bottom: 48px;
    }

    .pills {
      display: flex;
      gap: 12px;
    }
    .pill {
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
    }
    .pill-red {
      background: rgba(255,56,92,0.15);
      color: #FF385C;
      border: 1px solid rgba(255,56,92,0.3);
    }
    .pill-muted {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* URL bottom left */
    .url {
      position: absolute;
      bottom: 44px;
      left: 90px;
      font-size: 17px;
      font-weight: 600;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

  <div class="glow-tr"></div>
  <div class="glow-bl"></div>

  <!-- Decorative stage rings -->
  <svg class="rings" viewBox="0 0 420 420">
    <circle cx="210" cy="210" r="80"/>
    <circle cx="210" cy="210" r="130"/>
    <circle cx="210" cy="210" r="180"/>
    <circle cx="210" cy="210" r="230"/>
    <circle cx="210" cy="210" r="280"/>
  </svg>

  <div class="content">
    <div class="eyebrow">
      <div class="eyebrow-bar"></div>
      <div class="eyebrow-text">Live Music Venue Booking</div>
    </div>

    <div class="logo">GigN<span>Venue</span></div>

    <div class="tagline">
      Find and book live music venues across the USA —<br/>
      or list your stage and fill your calendar.
    </div>

    <div class="pills">
      <div class="pill pill-red">Free to list</div>
      <div class="pill pill-muted">Artists &amp; bookers</div>
      <div class="pill pill-muted">Venue hosts</div>
      <div class="pill pill-muted">USA</div>
    </div>
  </div>

  <div class="url">gignvenue.com</div>

</body>
</html>
