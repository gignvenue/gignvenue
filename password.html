<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GignVenue — Private Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 36px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #555; }
    button {
      width: 100%;
      padding: 14px;
      background: #ffffff;
      color: #000000;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .error {
      color: #e05c5c;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">GignVenue</div>
    <div class="subtitle">Private demo — enter password to continue</div>
    <input type="password" id="pwd" placeholder="Password" />
    <button onclick="checkPassword()">Enter</button>
    <div class="error" id="error">Incorrect password. Try again.</div>
  </div>

  <script>
    const PASSWORD = 'GignVenue2025';

    document.getElementById('pwd').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    function checkPassword() {
      const input = document.getElementById('pwd').value;
      if (input === PASSWORD) {
        // Set cookie for 7 days
        const expires = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toUTCString();
        document.cookie = `gnv_demo_auth=granted; expires=${expires}; path=/`;
        window.location.href = '/';
      } else {
        document.getElementById('error').style.display = 'block';
        document.getElementById('pwd').value = '';
        document.getElementById('pwd').focus();
      }
    }
  </script>
</body>
</html>
